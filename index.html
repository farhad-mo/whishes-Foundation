
<!DOCTYPE html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>بنیاد آرزوها | دنیایی زیباتر برای کودکان</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100;300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Vazirmatn', sans-serif;
      }
      .star-gradient {
        background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
      }
      .glow-on-hover:hover {
        box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
      }
      /* Custom Speech Bubble Shape */
      .speech-bubble {
        position: relative;
        background: #ffffff;
        border-radius: 3rem;
        border: 4px dotted #6b21a8; /* Purple dotted border */
      }
      .speech-bubble::after {
        content: '';
        position: absolute;
        bottom: -20px;
        right: 80px;
        width: 40px;
        height: 40px;
        background: white;
        border-right: 4px dotted #6b21a8;
        border-bottom: 4px dotted #6b21a8;
        transform: rotate(45deg);
        z-index: -1;
      }
      .hero-bg-overlay {
        background: linear-gradient(to left, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0) 100%);
      }
      /* Wavy bottom border effect */
      .wavy-border {
        background-image: radial-gradient(circle at 10px -5px, transparent 12px, white 13px);
        background-size: 20px 20px;
        height: 20px;
        width: 100%;
        position: absolute;
        bottom: 0;
        left: 0;
      }

      /* Infinite Scroll Animation - Seamless Loop for RTL */
      @keyframes scroll {
        0% { transform: translateX(0); }
        100% { transform: translateX(calc(184px * 18)); }
      }
      .animate-infinite-scroll {
        display: flex;
        width: max-content;
        animation: scroll 220s linear infinite;
      }
      .animate-infinite-scroll:hover {
        animation-play-state: paused;
      }

      @keyframes bounce-slow {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(-10px) rotate(5deg); }
      }
      .animate-bounce-slow {
        animation: bounce-slow 4s ease-in-out infinite;
      }
    </style>
